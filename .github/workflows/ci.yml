name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install StyLua
        env:
          STYLUA_VERSION: 2.4.1
        run: |
          curl -fsSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" -o stylua.zip
          unzip -q stylua.zip
          sudo install stylua /usr/local/bin/stylua

      - name: Check formatting
        run: stylua --check .

      - name: Fetch test dependencies
        run: ./scripts/setup-tests.sh

      - name: Run tests
        run: nvim --headless -u NONE -c "luafile tests/minimal_init.lua" -c "PlenaryBustedDirectory tests/spec { minimal_init = 'tests/minimal_init.lua' }" -c qa
